<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Computing Lab – Frontend App</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }
    .card {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }
    h1 {
      margin-bottom: 10px;
      color: #0a58ca;
    }
    p {
      margin-bottom: 20px;
      font-size: 15px;
    }
    input {
      width: 90%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #0a58ca;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover {
      background: #084298;
    }
    .output {
      margin-top: 20px;
      font-weight: bold;
      color: #198754;
    }
    footer {
      margin-top: 25px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cloud Lab Demo App</h1>
    <p>This is a <b>frontend-only web application</b> deployed on cloud.</p>

    <input type="text" id="name" placeholder="Enter your name" />
    <button onclick="greet()">Submit</button>

    <div class="output" id="output"></div>

    <footer>
      Cloud Computing Lab | MCA
    </footer>
  </div>

  <script>
    function greet() {
      const name = document.getElementById("name").value;
      const output = document.getElementById("output");
      if (name.trim() === "") {
        output.textContent = "Please enter your name.";
        output.style.color = "#dc3545";
      } else {
        output.textContent = `Hello, ${name}! Your frontend app is live on the cloud.`;
        output.style.color = "#198754";
      }
    }
  </script>
</body>
</html>
